<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow" />
<meta name="googlebot" content="noindex, nofollow" />
  <title>гҒҠгҒұгӮ“гӮёгӮ§гғҚ</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f9f9f9;
      padding: 20px;
    }
    h1 {
      font-size: 1.4em;
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      height: 80px;
      font-size: 16px;
      margin-bottom: 10px;
      padding: 8px;
    }
    .output {
      font-size: 20px;
      white-space: pre-wrap;
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 60px;
      margin-bottom: 10px;
    }
    button {
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <h1>гҒҠгҒұгӮ“гӮёгӮ§гғҚ</h1>
  <textarea id="inputText" placeholder="гӮўгғ«гғ•гӮЎгғҷгғғгғҲгӮ’е…ҘеҠӣ"></textarea>
  <div class="output" id="outputText"></div>
  <button onclick="copyText()">гӮігғ”гғј</button>
  <button onclick="clearText()">гӮҜгғӘгӮў</button>

  <script>
    const decoMap = {
      'a': ['вӮҗ','Н‘','Нҳ','Нһ'],
      'b': ['бөҮ','Нӣ','Нқ'],
      'c': ['б¶ң','Мҙ','Н’','Н '],
      'd': ['бөҲ','Нӣ','Нқ','Нһ'],
      'e': ['вӮ‘','Н’','НҠ'],
      'f': ['б¶ ','Нӣ','Нқ'],
      'g': ['бөҚ','Нӣ','Нқ','Нһ'],
      'h': ['вӮ•','НЎ','Нһ','Нқ'],
      'i': ['бөў','Мҙ','МӢ','Н’'],
      'j': ['КІ','Нӣ','Нқ'],
      'k': ['бөҸ','Нӣ','Нқ','Нһ'],
      'l': ['ЛЎ','Нӣ','Нқ'],
      'm': ['вӮҳ','Нӣ','Нқ','Нһ'],
      'n': ['вҒҝ','Нӣ','Нқ'],
      'o': ['вӮ’','Нӣ','Н’','НҠ','Нқ'],
      'p': ['бө–','Нӣ','Нқ','Нһ'],
      'q': ['бө ','Нӣ','Нқ'],
      'r': ['Кі','Нӣ','Нқ','Нһ'],
      's': ['вӮӣ','М·','Нӣ','Н '],
      't': ['вӮң','Нӣ','Нқ','Нһ'],
      'u': ['бөӨ','НЎ','Нһ','Нқ'],
      'v': ['бөӣ','Нӣ','Нқ'],
      'w': ['К·','Нӣ','Нқ','Нһ'],
      'x': ['ЛЈ','Нӣ','Нқ'],
      'y': ['Кё','Нӣ','Нқ','Нһ'],
      'z': ['б¶»','М·','Нӣ','Н '],
      ' ': [' ']
    };

    // keyupгӮӨгғҷгғігғҲгҒ§еӨүжҸӣ
    document.getElementById('inputText').addEventListener('keyup', () => {
      const input = document.getElementById('inputText').value.toLowerCase();
      let result = '';

      for (let char of input) {
        if (decoMap[char]) {
          result += decoMap[char].map(part => part).join('');
        } else {
          result += char;
        }
      }

      document.getElementById('outputText').textContent = result;
    });

    function copyText() {
      const output = document.getElementById('outputText').textContent;
      navigator.clipboard.writeText(output).then(() => {
        alert('гӮігғ”гғјгҒ—гҒҫгҒ—гҒҹпјҒ');
      });
    }

    function clearText() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputText').textContent = '';
    }
  </script>
</body>
</html>
